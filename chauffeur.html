<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YONOU VTC - Chauffeur</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 350px;
            background: white;
            border-right: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            background: #1877f2;
            color: white;
            padding: 25px 20px;
        }

        .status-card {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        .status-btn.off { color: #f44336; }
        .status-btn.on { color: #4caf50; }

        .profile-section {
            padding: 25px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .driver-avatar {
            width: 90px;
            height: 90px;
            background: #f0f2f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 45px;
            border: 3px solid #1877f2;
        }

        .login-btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        .rides-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .ride-count {
            background: #1877f2;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .ride-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            animation: slideIn 0.3s;
        }

        .ride-card.new {
            border-color: #1877f2;
            background: #e3f2fd;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .ride-price {
            font-size: 28px;
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 12px;
        }

        .ride-location {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            font-size: 16px;
        }

        .accept-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
        }

        .completed-rides {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 16px;
        }

        .completed-item {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        /* CARTE */
        .map-container {
            flex: 1;
            position: relative;
        }

        #driverMap {
            width: 100%;
            height: 100%;
        }

        /* PANNEAU COURSE ACTIVE */
        .active-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.3);
            padding: 25px;
            max-width: 500px;
            margin: 0 auto;
            display: none;
            z-index: 10;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-badge {
            background: #4caf50;
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
        }

        .client-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-avatar {
            width: 60px;
            height: 60px;
            background: #1877f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .start-btn {
            background: #1877f2;
            color: white;
        }

        .arrive-btn {
            background: #ff9800;
            color: white;
        }

        .cancel-btn {
            background: #ffebee;
            color: #f44336;
        }

        .complete-btn {
            background: #4caf50;
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            display: none;
        }

        .distance-info {
            text-align: center;
            margin: 15px 0;
            color: #666;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
        }

        .modal-box input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
        }

        .modal-btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: #323232;
            color: white;
            padding: 16px;
            border-radius: 12px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🚖 YONOU VTC</h1>
                <p>Espace chauffeur</p>
                
                <div class="status-card">
                    <span id="statusText">🔴 Hors ligne</span>
                    <button class="status-btn off" id="statusBtn" onclick="toggleStatus()">
                        DÉSACTIVÉ
                    </button>
                </div>
            </div>

            <!-- PROFIL NON CONNECTE -->
            <div id="disconnectedProfile">
                <div class="profile-section">
                    <div class="driver-avatar">👤</div>
                    <button class="login-btn" onclick="openLogin()">
                        SE CONNECTER
                    </button>
                </div>
            </div>

            <!-- PROFIL CONNECTE -->
            <div id="connectedProfile" style="display: none;">
                <div class="profile-section">
                    <div class="driver-avatar">👨‍✈️</div>
                    <div style="font-weight: 600; font-size: 20px;" id="driverName">Moussa Diop</div>
                    <div style="color: #666;" id="driverPhone">77 123 45 67</div>
                    <div style="margin-top: 15px; background: #f5f5f5; padding: 12px; border-radius: 10px;">
                        🚗 Toyota Corolla - Noir - AB-1234-CD
                    </div>
                </div>
            </div>

            <!-- COURSES DISPONIBLES -->
            <div class="rides-section">
                <div class="section-title">
                    📋 COURSES DISPONIBLES
                    <span class="ride-count" id="rideCount">0</span>
                </div>
                <div id="ridesList"></div>

                <!-- COURSES TERMINEES -->
                <div class="completed-rides" id="completedSection" style="display: none;">
                    <h3 style="margin-bottom: 15px;">✅ Courses terminées</h3>
                    <div id="completedList"></div>
                </div>
            </div>
        </div>

        <!-- CARTE -->
        <div class="map-container">
            <div id="driverMap"></div>

            <!-- PANNEAU COURSE ACTIVE -->
            <div class="active-panel" id="activePanel">
                <div class="panel-header">
                    <span style="font-weight: 600; font-size: 18px;">Course en cours</span>
                    <span class="status-badge" id="tripStatus">Acceptée</span>
                </div>

                <div class="client-card">
                    <div class="client-avatar">👤</div>
                    <div>
                        <div style="font-weight: 600; font-size: 18px;" id="clientName">Client</div>
                        <div style="color: #666;" id="clientPhone">-</div>
                    </div>
                </div>

                <div style="margin: 15px 0;">
                    <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                        <span style="color: #4caf50;">🟢</span>
                        <span id="tripStart">Départ</span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <span style="color: #f44336;">🔴</span>
                        <span id="tripEnd">Arrivée</span>
                    </div>
                </div>

                <div class="distance-info" id="distanceToClient">
                    Distance: <span id="clientDistance">-</span>
                </div>

                <div class="action-buttons" id="initialActions">
                    <button class="action-btn start-btn" onclick="goToClient()" id="goToClientBtn">
                        🚗 ALLER VERS CLIENT
                    </button>
                    <button class="action-btn cancel-btn" onclick="cancelTrip()">
                        ANNULER
                    </button>
                </div>

                <button class="action-btn arrive-btn" id="arrivedBtn" style="display: none;" onclick="markArrived()">
                    🟢 JE SUIS ARRIVÉ
                </button>

                <button class="action-btn start-btn" id="startTripBtn" style="display: none;" onclick="startTrip()">
                    🚀 COMMENCER LA COURSE
                </button>

                <button class="complete-btn" id="completeBtn" onclick="completeTrip()">
                    ✅ TERMINER LA COURSE
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL CONNEXION -->
    <div class="modal" id="loginModal">
        <div class="modal-box">
            <h2 style="text-align: center; margin-bottom: 25px;">Connexion chauffeur</h2>
            <input type="text" id="loginPhone" placeholder="Téléphone">
            <input type="password" id="loginCode" placeholder="Code">
            <button class="modal-btn" onclick="loginDriver()">SE CONNECTER</button>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div class="notification" id="notification"></div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- LEAFLET -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAmLwdTDiT6XP9iB3aNbSWRdQ6njw3TlLc",
            authDomain: "saldiaemploidutemps.firebaseapp.com",
            projectId: "saldiaemploidutemps",
            storageBucket: "saldiaemploidutemps.firebasestorage.app",
            messagingSenderId: "666378499509",
            appId: "1:666378499509:web:ae26cdaa2d2b0a67d255fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==================== VARIABLES ====================
        let map;
        let driverMarker;
        let routingControl = null;
        let isOnline = false;
        let isLoggedIn = false;
        let driverId = localStorage.getItem('driverId') || null;
        let currentTripId = null;
        let currentTrip = null;
        let unsubscribeTrips = null;
        let watchPosition = null;

        // ==================== INITIALISATION ====================
        window.onload = function() {
            initMap();
            startLocationTracking();
            listenForTrips();
            loadCompletedTrips();
            
            if (driverId) {
                autoLogin();
            }
        };

        function initMap() {
            map = L.map('driverMap').setView([14.7167, -17.4677], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        function startLocationTracking() {
            if (navigator.geolocation) {
                watchPosition = navigator.geolocation.watchPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        updateDriverPosition(lat, lng);
                        
                        if (driverMarker) {
                            driverMarker.setLatLng([lat, lng]);
                        } else {
                            driverMarker = L.marker([lat, lng], {
                                icon: L.divIcon({ html: '🚗', iconSize: [30, 30] })
                            }).addTo(map);
                        }
                        
                        // Si une course est active, mettre à jour la distance
                        if (currentTrip && currentTrip.depart) {
                            updateDistanceToClient(lat, lng, currentTrip.depart);
                        }
                    },
                    function(error) {
                        console.log("Erreur GPS:", error);
                    }
                );
            }
        }

        async function updateDriverPosition(lat, lng) {
            if (isLoggedIn && driverId) {
                await db.collection("drivers").doc(driverId).set({
                    location: { lat, lng },
                    lastUpdate: new Date().toISOString(),
                    status: isOnline ? 'online' : 'offline'
                }, { merge: true });
            }
        }

        // ==================== ÉCOUTE DES COURSES ====================
        function listenForTrips() {
            unsubscribeTrips = db.collection("trips")
                .where("status", "==", "searching")
                .onSnapshot((snapshot) => {
                    document.getElementById('ridesList').innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const trip = doc.data();
                        addRideToList(doc.id, trip);
                    });
                    
                    updateRideCount();
                });
        }

        function addRideToList(tripId, trip) {
            const list = document.getElementById('ridesList');
            
            const card = document.createElement('div');
            card.className = 'ride-card new';
            card.id = `ride_${tripId}`;
            
            card.innerHTML = `
                <div class="ride-price">${trip.prix || '2500 F'}</div>
                <div class="ride-location">
                    <span style="color: #4caf50;">🟢</span> ${trip.depart?.label || 'Départ'}
                </div>
                <div class="ride-location">
                    <span style="color: #f44336;">🔴</span> ${trip.arrivee?.label || 'Arrivée'}
                </div>
                <button class="accept-btn" onclick="acceptTrip('${tripId}')">
                    ACCEPTER
                </button>
            `;
            
            list.appendChild(card);
        }

        function updateRideCount() {
            const count = document.getElementById('ridesList').children.length;
            document.getElementById('rideCount').innerHTML = count;
        }

        // ==================== ACCEPTATION COURSE ====================
        async function acceptTrip(tripId) {
            if (!isLoggedIn) {
                showNotification("Connectez-vous d'abord");
                openLogin();
                return;
            }
            
            if (!isOnline) {
                showNotification("Passez en mode EN LIGNE");
                return;
            }

            try {
                const tripDoc = await db.collection("trips").doc(tripId).get();
                const trip = tripDoc.data();
                
                if (trip.status !== 'searching') {
                    showNotification("Course déjà prise");
                    return;
                }

                const driverInfo = {
                    id: driverId,
                    name: document.getElementById('driverName').innerHTML,
                    phone: document.getElementById('driverPhone').innerHTML,
                    vehicle: "Toyota Corolla - Noir - AB-1234-CD",
                    plate: "AB-1234-CD"
                };

                await db.collection("trips").doc(tripId).update({
                    status: 'accepted',
                    driverId: driverId,
                    driverInfo: driverInfo,
                    acceptedAt: new Date().toISOString()
                });

                currentTripId = tripId;
                currentTrip = trip;

                // Afficher panneau
                document.getElementById('activePanel').style.display = 'block';
                document.getElementById('tripStart').innerHTML = trip.depart?.label || 'Départ';
                document.getElementById('tripEnd').innerHTML = trip.arrivee?.label || 'Arrivée';
                document.getElementById('clientPhone').innerHTML = trip.clientTel || '77 XXX XX XX';
                
                // Cacher de la liste
                document.getElementById(`ride_${tripId}`).style.display = 'none';
                updateRideCount();

                // Tracer itinéraire vers client
                if (trip.depart) {
                    traceRouteToClient(trip.depart);
                }

                showNotification("✅ Course acceptée !");

            } catch (error) {
                console.error("Erreur:", error);
                showNotification("Erreur lors de l'acceptation");
            }
        }

        function traceRouteToClient(depart) {
            if (routingControl) {
                map.removeControl(routingControl);
            }

            navigator.geolocation.getCurrentPosition(function(pos) {
                routingControl = L.Routing.control({
                    waypoints: [
                        L.latLng(pos.coords.latitude, pos.coords.longitude),
                        L.latLng(depart.lat, depart.lng)
                    ],
                    routeWhileDragging: false,
                    lineOptions: { styles: [{ color: '#1877f2', weight: 6 }] }
                }).addTo(map);
            });
        }

        function updateDistanceToClient(driverLat, driverLng, clientPoint) {
            const distance = getDistance(
                driverLat, driverLng,
                clientPoint.lat, clientPoint.lng
            );
            
            document.getElementById('clientDistance').innerHTML = distance.toFixed(2) + ' km';
            
            // Si à moins de 10 mètres
            if (distance < 0.01) {
                document.getElementById('goToClientBtn').style.display = 'none';
                document.getElementById('arrivedBtn').style.display = 'block';
            }
        }

        // ==================== ACTIONS COURSE ====================
        async function goToClient() {
            document.getElementById('tripStatus').innerHTML = 'En route vers client';
            showNotification("🚗 En route vers le point de départ");
        }

        async function markArrived() {
            await db.collection("trips").doc(currentTripId).update({
                status: 'arrived'
            });
            
            document.getElementById('arrivedBtn').style.display = 'none';
            document.getElementById('startTripBtn').style.display = 'block';
            document.getElementById('tripStatus').innerHTML = 'Arrivé';
            
            showNotification("✅ Vous êtes arrivé, le client peut monter");
        }

        async function startTrip() {
            await db.collection("trips").doc(currentTripId).update({
                status: 'started',
                startedAt: new Date().toISOString()
            });
            
            document.getElementById('startTripBtn').style.display = 'none';
            document.getElementById('completeBtn').style.display = 'block';
            document.getElementById('tripStatus').innerHTML = 'Course en cours';
            
            // Tracer itinéraire vers destination
            if (currentTrip.arrivee) {
                traceRouteToDestination(currentTrip.arrivee);
            }
            
            showNotification("🚀 Course commencée !");
        }

        function traceRouteToDestination(arrivee) {
            if (routingControl) {
                map.removeControl(routingControl);
            }

            navigator.geolocation.getCurrentPosition(function(pos) {
                routingControl = L.Routing.control({
                    waypoints: [
                        L.latLng(pos.coords.latitude, pos.coords.longitude),
                        L.latLng(arrivee.lat, arrivee.lng)
                    ],
                    routeWhileDragging: false,
                    lineOptions: { styles: [{ color: '#4caf50', weight: 6 }] }
                }).addTo(map);
            });
        }

        async function completeTrip() {
            const earnings = {
                date: new Date().toLocaleDateString('fr-FR'),
                prix: currentTrip.prix,
                client: 'Client',
                depart: currentTrip.depart?.label,
                arrivee: currentTrip.arrivee?.label
            };

            await db.collection("trips").doc(currentTripId).update({
                status: 'completed',
                completedAt: new Date().toISOString(),
                earnings: earnings
            });

            // Sauvegarder localement
            saveCompletedTrip(earnings);

            showNotification("✅ Course terminée ! +" + currentTrip.prix);
            
            setTimeout(() => {
                document.getElementById('activePanel').style.display = 'none';
                document.getElementById('completeBtn').style.display = 'none';
                document.getElementById('initialActions').style.display = 'flex';
                document.getElementById('goToClientBtn').style.display = 'block';
                document.getElementById('tripStatus').innerHTML = 'Acceptée';
                currentTripId = null;
                currentTrip = null;
            }, 2000);
        }

        async function cancelTrip() {
            if (!currentTripId) return;
            
            if (confirm("Annuler cette course ?")) {
                await db.collection("trips").doc(currentTripId).update({
                    status: 'cancelled'
                });
                
                document.getElementById('activePanel').style.display = 'none';
                currentTripId = null;
                currentTrip = null;
                
                showNotification("Course annulée");
            }
        }

        // ==================== COURSES TERMINEES ====================
        function saveCompletedTrip(trip) {
            let completed = JSON.parse(localStorage.getItem('completedTrips') || '[]');
            completed.unshift(trip);
            if (completed.length > 20) completed = completed.slice(0, 20);
            localStorage.setItem('completedTrips', JSON.stringify(completed));
            loadCompletedTrips();
        }

        function loadCompletedTrips() {
            const completed = JSON.parse(localStorage.getItem('completedTrips') || '[]');
            const list = document.getElementById('completedList');
            
            if (completed.length === 0) {
                document.getElementById('completedSection').style.display = 'none';
                return;
            }
            
            document.getElementById('completedSection').style.display = 'block';
            
            let html = '';
            completed.forEach(trip => {
                html += `
                    <div class="completed-item">
                        <div style="font-weight: 600;">${trip.prix}</div>
                        <div style="color: #666; font-size: 12px;">${trip.date}</div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        // ==================== CONNEXION ====================
        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function loginDriver() {
            const phone = document.getElementById('loginPhone').value;
            const code = document.getElementById('loginCode').value;
            
            if (phone && code) {
                isLoggedIn = true;
                driverId = 'driver_' + Date.now();
                localStorage.setItem('driverId', driverId);
                
                document.getElementById('disconnectedProfile').style.display = 'none';
                document.getElementById('connectedProfile').style.display = 'block';
                document.getElementById('driverPhone').innerHTML = phone;
                
                document.getElementById('loginModal').style.display = 'none';
                
                // Enregistrer dans Firebase
                db.collection("drivers").doc(driverId).set({
                    phone: phone,
                    name: "Moussa Diop",
                    status: 'offline',
                    registeredAt: new Date().toISOString()
                });
                
                showNotification("Connecté avec succès");
            }
        }

        function autoLogin() {
            isLoggedIn = true;
            document.getElementById('disconnectedProfile').style.display = 'none';
            document.getElementById('connectedProfile').style.display = 'block';
        }

        function toggleStatus() {
            if (!isLoggedIn) {
                openLogin();
                return;
            }
            
            isOnline = !isOnline;
            const statusText = document.getElementById('statusText');
            const statusBtn = document.getElementById('statusBtn');
            
            if (isOnline) {
                statusText.innerHTML = '🟢 En ligne';
                statusBtn.innerHTML = 'ACTIVÉ';
                statusBtn.className = 'status-btn on';
            } else {
                statusText.innerHTML = '🔴 Hors ligne';
                statusBtn.innerHTML = 'DÉSACTIVÉ';
                statusBtn.className = 'status-btn off';
            }
            
            // Mettre à jour Firebase
            if (driverId) {
                db.collection("drivers").doc(driverId).update({
                    status: isOnline ? 'online' : 'offline'
                });
            }
        }

        // ==================== UTILITAIRES ====================
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.innerHTML = msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    </script>
</body>
